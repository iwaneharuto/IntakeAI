<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntakeAI — 初回相談整理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── reset & tokens ── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#ffffff;--bg:#f9f9f8;--bg2:#f2f1ef;
  --border:#e2e0dc;--bd2:#ccc9c2;
  --text:#1a1a1a;--sub:#555;--muted:#888;
  --accent:#1a3052;--ac2:#2a4a72;
  --gold:#8a6d3b;--red:#7a2020;--green:#1e5c3a;
}
body{font-family:'Noto Sans JP',sans-serif;font-weight:400;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.7}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LOGIN OVERLAY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#loginOverlay{
  position:fixed;inset:0;z-index:200;
  background:#f2f1ef;
  display:flex;align-items:center;justify-content:center;
}
.login-box{
  background:var(--white);border:1px solid var(--border);
  border-top:3px solid var(--accent);
  width:400px;max-width:94vw;padding:44px 44px 40px;
}
.login-brand{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px}
.login-tagline{font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:36px}
.form-row{margin-bottom:18px}
.form-label{display:block;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.form-input{
  width:100%;border:1px solid var(--border);background:var(--bg);
  padding:10px 14px;font-family:'Noto Sans JP',sans-serif;
  font-size:14px;color:var(--text);outline:none;transition:border-color .15s;
}
.form-input:focus{border-color:var(--accent)}
.btn-login{
  width:100%;background:var(--accent);color:#fff;border:none;padding:12px;
  font-family:'Noto Serif JP',serif;font-size:14px;font-weight:700;
  letter-spacing:.06em;cursor:pointer;margin-top:6px;transition:background .15s;
}
.btn-login:hover{background:var(--ac2)}
.login-err{font-size:12px;color:var(--red);margin-top:10px;display:none}
.login-hint{font-size:11px;color:var(--muted);margin-top:20px;padding-top:16px;border-top:1px solid var(--border);line-height:1.9}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   APP SHELL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#appShell{display:none;min-height:100vh}

/* topbar */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--white);border-bottom:1px solid var(--border);
  padding:0 32px;height:56px;display:flex;align-items:center;gap:16px;
}
.brand{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:700;color:var(--accent)}
.brand-sub{font-size:11px;color:var(--muted);padding-left:16px;border-left:1px solid var(--bd2);letter-spacing:.04em}
.topbar-spacer{flex:1}
.topbar-user{font-size:12px;color:var(--muted);letter-spacing:.04em}
.btn-logout{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:6px 16px;font-size:12px;cursor:pointer;transition:border-color .15s,color .15s;
}
.btn-logout:hover{border-color:var(--accent);color:var(--accent)}

/* layout */
.layout{display:flex;min-height:calc(100vh - 56px)}

/* sidebar */
.sidebar{
  width:256px;flex-shrink:0;background:var(--white);
  border-right:1px solid var(--border);padding:24px 0;
  overflow-y:auto;position:sticky;top:56px;max-height:calc(100vh - 56px);
}
.sidebar-head{
  font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);padding:0 20px 12px;border-bottom:1px solid var(--border);margin-bottom:8px;
}
.history-empty{font-size:12px;color:var(--muted);padding:20px;text-align:center;line-height:2}
.hist-item{
  padding:12px 20px;border-bottom:1px solid var(--bg2);
  cursor:pointer;position:relative;transition:background .12s;
}
.hist-item:hover{background:var(--bg)}
.hist-item.active{background:var(--bg2);border-left:2px solid var(--accent)}
.hist-date{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:.04em}
.hist-title{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}
.hist-del{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--border);cursor:pointer;font-size:13px;
  padding:4px;display:none;transition:color .12s;
}
.hist-item:hover .hist-del{display:block}
.hist-del:hover{color:var(--red)}

/* main */
.main{flex:1;padding:52px 48px 100px;max-width:820px}
.sec-label{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.sec-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--accent);margin-bottom:20px}

/* panel */
.panel{background:var(--white);border:1px solid var(--border);padding:36px 40px;margin-bottom:48px}
.panel-note{font-size:13px;color:var(--sub);line-height:1.8;padding-bottom:20px;margin-bottom:20px;border-bottom:1px solid var(--border)}

textarea{
  width:100%;min-height:210px;border:1px solid var(--border);
  background:var(--bg);padding:18px 20px;
  font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);
  line-height:1.85;resize:vertical;outline:none;transition:border-color .15s;
}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:#bbb}

.input-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.char-count{font-size:12px;color:var(--muted)}

.btn-run{
  background:var(--accent);color:#fff;border:none;padding:12px 38px;
  font-family:'Noto Serif JP',serif;font-size:14px;font-weight:700;
  letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;gap:9px;
  transition:background .15s;
}
.btn-run:hover:not(:disabled){background:var(--ac2)}
.btn-run:disabled{opacity:.4;cursor:not-allowed}

.spinner{
  width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
.btn-run.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{
  background:#fdf5f5;border:1px solid #d9b0b0;
  padding:11px 16px;font-size:13px;color:var(--red);margin-top:14px;display:none;
}
.error-box.show{display:block}
.divider{border:none;border-top:1px solid var(--border);margin-bottom:40px}

/* results */
#results{display:none}
#results.show{display:block}
.results-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px}

.btn-pdf{
  background:var(--white);color:var(--accent);border:1px solid var(--accent);
  padding:9px 22px;font-size:13px;font-weight:500;cursor:pointer;
  letter-spacing:.04em;display:flex;align-items:center;gap:7px;
  transition:background .15s,color .15s;
}
.btn-pdf:hover{background:var(--accent);color:#fff}

/* result table */
.result-table{border:1px solid var(--border)}
.result-row{display:grid;grid-template-columns:190px 1fr;border-top:1px solid var(--border)}
.result-row:first-child{border-top:none}
.row-label{padding:26px 24px;background:var(--bg);border-right:1px solid var(--border)}
.row-num{font-size:10px;letter-spacing:.12em;color:var(--muted);margin-bottom:6px}
.row-title{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:700;color:var(--accent);line-height:1.5}
.row-rule{width:22px;height:2px;margin-top:10px}
.row-body{padding:26px 30px}
.row-body ul{list-style:none;padding:0}
.row-body li{
  padding:5px 0 5px 16px;position:relative;
  border-bottom:1px solid var(--border);font-size:13.5px;line-height:1.75;color:var(--text);
}
.row-body li:last-child{border-bottom:none}
.row-body li::before{content:'';position:absolute;left:0;top:14px;width:5px;height:1px;background:var(--bd2)}
.row-body p{font-size:13.5px;line-height:1.8;color:var(--text)}
.footnote{margin-top:24px;font-size:11px;color:var(--muted);padding-top:14px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-brand">IntakeAI</div>
    <div class="login-tagline">初回相談整理システム</div>
    <div class="form-row">
      <label class="form-label">ユーザーID</label>
      <input class="form-input" id="loginId" type="text" placeholder="user@lawoffice.jp" autocomplete="username">
    </div>
    <div class="form-row">
      <label class="form-label">パスワード</label>
      <input class="form-input" id="loginPw" type="password" placeholder="パスワードを入力" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="loginErr">IDまたはパスワードが正しくありません。</div>
    <div class="login-hint">
      デモ用アカウント<br>
      ID: <strong>demo</strong>　パスワード: <strong>demo123</strong>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="topbar">
    <div class="brand">IntakeAI</div>
    <div class="brand-sub">初回相談整理システム</div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user" id="topbarUser"></div>
    <button class="btn-logout" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">相談履歴</div>
      <div id="historyList"><div class="history-empty">履歴がありません</div></div>
    </aside>

    <main class="main">
      <div class="sec-label">相談内容の入力</div>
      <div class="sec-title">相談メモを入力してください</div>

      <div class="panel">
        <p class="panel-note">
          箇条書き・会話メモ・断片的な記録など、形式は問いません。<br>
          入力後に「整理する」を押すと、AIが4項目に自動整理します。
        </p>
        <textarea id="memo" placeholder="例：依頼者は山田太郎（45歳）。先月、勤務先から突然解雇通告を受けた。理由は「業績不振」とのことだが、直前に上司と口論があった。雇用契約書・給与明細は手元にある。残業代も未払いの可能性あり。妻子あり、早急に対応したい。"></textarea>
        <div class="input-foot">
          <span class="char-count" id="charCount">0 文字</span>
          <button class="btn-run" id="analyzeBtn" onclick="analyze()">
            <div class="spinner"></div>
            <span id="btnText">整理する</span>
          </button>
        </div>
        <div class="error-box" id="errorBox"></div>
      </div>

      <hr class="divider">

      <div id="results">
        <div class="results-head">
          <div>
            <div class="sec-label">整理結果</div>
            <div class="sec-title" style="margin-bottom:0">相談内容の分析</div>
          </div>
          <button class="btn-pdf" onclick="savePDF()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            PDF出力
          </button>
        </div>

        <div class="result-table">
          <div class="result-row">
            <div class="row-label"><div class="row-num">01</div><div class="row-title">事実関係</div><div class="row-rule" style="background:var(--accent)"></div></div>
            <div class="row-body" id="out-facts"></div>
          </div>
          <div class="result-row">
            <div class="row-label"><div class="row-num">02</div><div class="row-title">依頼者の主張</div><div class="row-rule" style="background:var(--gold)"></div></div>
            <div class="row-body" id="out-claims"></div>
          </div>
          <div class="result-row">
            <div class="row-label"><div class="row-num">03</div><div class="row-title">想定される論点</div><div class="row-rule" style="background:var(--red)"></div></div>
            <div class="row-body" id="out-issues"></div>
          </div>
          <div class="result-row">
            <div class="row-label"><div class="row-num">04</div><div class="row-title">追加で確認すべき事項</div><div class="row-rule" style="background:var(--green)"></div></div>
            <div class="row-body" id="out-todo"></div>
          </div>
        </div>

        <div class="footnote">※ 本ツールはAIによる補助目的です。出力内容は必ず担当弁護士が確認・修正してください。</div>
      </div>
    </main>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  AUTH  (デモ用ハードコード。本番は要サーバー認証)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const USERS = { demo:'demo123', admin:'admin123' };
let currentUser = null;

function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (USERS[id] && USERS[id] === pw) {
    currentUser = id;
    document.getElementById('loginErr').style.display   = 'none';
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('appShell').style.display   = 'block';
    document.getElementById('topbarUser').textContent   = id;
    loadHistory();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
['loginId','loginPw'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); })
);

function doLogout() {
  currentUser = null;
  document.getElementById('appShell').style.display    = 'none';
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginId').value  = '';
  document.getElementById('loginPw').value  = '';
  document.getElementById('memo').value     = '';
  document.getElementById('charCount').textContent = '0 文字';
  document.getElementById('results').classList.remove('show');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  HISTORY  (localStorage — ブラウザ永続)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function histKey(ts) { return `intakeai:${currentUser}:${ts}`; }

function saveHistory(title, memo, result) {
  const ts  = Date.now();
  const rec = JSON.stringify({ ts, title, memo, result });
  try { localStorage.setItem(histKey(ts), rec); } catch(e) { console.warn('localStorage full?', e); }
  loadHistory();
}

function loadHistory() {
  const list    = document.getElementById('historyList');
  const prefix  = `intakeai:${currentUser}:`;
  const entries = [];

  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k.startsWith(prefix)) continue;
    try { entries.push({ key: k, data: JSON.parse(localStorage.getItem(k)) }); } catch {}
  }

  if (!entries.length) {
    list.innerHTML = '<div class="history-empty">履歴がありません</div>';
    return;
  }

  entries.sort((a, b) => b.data.ts - a.data.ts);
  list.innerHTML = '';
  entries.forEach(({ key, data }) => {
    const dt   = new Date(data.ts).toLocaleString('ja-JP', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    const item = document.createElement('div');
    item.className = 'hist-item';
    item.innerHTML = `
      <div class="hist-date">${dt}</div>
      <div class="hist-title">${esc(data.title || data.memo?.slice(0,24) || '—')}</div>
      <button class="hist-del" title="削除" onclick="deleteHistory(event,'${key}')">✕</button>`;
    item.addEventListener('click', () => restoreHistory(data, item));
    list.appendChild(item);
  });
}

function deleteHistory(e, key) {
  e.stopPropagation();
  localStorage.removeItem(key);
  loadHistory();
}

function restoreHistory(data, el) {
  document.querySelectorAll('.hist-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('memo').value = data.memo || '';
  document.getElementById('charCount').textContent = (data.memo||'').length + ' 文字';
  renderResults(data.result);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CHAR COUNT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('memo').addEventListener('input', () => {
  document.getElementById('charCount').textContent = document.getElementById('memo').value.length + ' 文字';
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ANALYZE  — calls /api/analyze (APIキーはサーバー側)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function analyze() {
  const text = document.getElementById('memo').value.trim();
  if (!text)         { showError('相談メモを入力してください。'); return; }
  if (text.length < 15) { showError('もう少し詳しく入力してください。'); return; }
  hideError();
  setLoading(true);

  try {
    const res = await fetch('/api/analyze', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ memo: text }),
    });

    const parsed = await res.json();
    if (!res.ok) throw new Error(parsed.error || `エラー (${res.status})`);

    renderResults(parsed);
    saveHistory(parsed.title || text.slice(0, 20), text, parsed);

  } catch(err) {
    showError(err.message || '予期しないエラーが発生しました。');
  } finally {
    setLoading(false);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderResults(data) {
  ['facts','claims','issues','todo'].forEach(key => {
    const el  = document.getElementById('out-'+key);
    const raw = (data[key]||'').trim();
    if (!raw) { el.innerHTML='<p style="color:#bbb">（情報なし）</p>'; return; }
    const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
    if (lines.some(l => /^[・\-\*]/.test(l))) {
      const ul = document.createElement('ul');
      lines.forEach(line => {
        const t = line.replace(/^[・\-\*]\s*/,'').trim();
        if (t) { const li=document.createElement('li'); li.textContent=t; ul.appendChild(li); }
      });
      el.innerHTML = ''; el.appendChild(ul);
    } else {
      el.innerHTML = `<p>${raw}</p>`;
    }
  });
  const r = document.getElementById('results');
  r.classList.add('show');
  setTimeout(() => r.scrollIntoView({ behavior:'smooth', block:'start' }), 60);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  PDF  Canvas → PDF binary → download
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function savePDF() {
  const btn  = document.querySelector('.btn-pdf');
  const orig = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = '生成中...';

  try {
    const SECS = [
      { id:'out-facts',   label:'01  事実関係',            accent:[26,48,82]   },
      { id:'out-claims',  label:'02  依頼者の主張',         accent:[138,109,59] },
      { id:'out-issues',  label:'03  想定される論点',       accent:[122,32,32]  },
      { id:'out-todo',    label:'04  追加で確認すべき事項',  accent:[30,92,58]   },
    ];
    const now = new Date().toLocaleString('ja-JP');
    const PX  = 3.7795;
    const W   = Math.round(210*PX), H=Math.round(297*PX);
    const ML  = 52, MR=52, MT=52, CW=W-ML-MR;

    const cv  = document.createElement('canvas');
    cv.width  = W; cv.height = H*5;
    const ctx = cv.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);

    const wrap=(text,mw)=>{const ls=[]; let c=''; for(const ch of[...text]){const t=c+ch; if(ctx.measureText(t).width>mw&&c){ls.push(c);c=ch;}else c=t;} if(c)ls.push(c); return ls;};
    const hl=(y,x1,x2,cl='#e2e0dc',lw=1)=>{ctx.save();ctx.strokeStyle=cl;ctx.lineWidth=lw;ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();ctx.restore();};
    const fr=(x,y,w,h,cl)=>{ctx.fillStyle=cl;ctx.fillRect(x,y,w,h);};

    let y=MT;
    ctx.font='bold 22px serif';ctx.fillStyle='#1a3052';ctx.fillText('IntakeAI',ML,y+22);y+=34;
    ctx.font='400 12px sans-serif';ctx.fillStyle='#888';ctx.fillText('初回相談整理レポート　出力日時：'+now,ML,y+14);y+=24;
    hl(y,ML,W-MR,'#1a3052',2);y+=20;

    for(const sec of SECS){
      const el=document.getElementById(sec.id);
      const lis=[...el.querySelectorAll('li')].map(l=>l.textContent.trim());
      const ptxt=el.querySelector('p')?.textContent.trim();
      const items=lis.length?lis:(ptxt?[ptxt]:['（情報なし）']);
      const LW=150,BX=ML+LW+16,BW=CW-LW-16,PAD=16,sy=y;
      ctx.font='bold 12px serif';ctx.fillStyle='#1a3052';
      const ll=wrap(sec.label,LW-16);
      let by=sy+PAD;
      for(let i=0;i<items.length;i++){
        ctx.font='400 13px sans-serif';
        const ls=wrap(items[i],BW-20),ih=ls.length*21+10;
        fr(BX,by+10,5,1,'#aaa');ctx.fillStyle='#1a1a1a';
        ls.forEach((l,li)=>ctx.fillText(l,BX+14,by+14+li*21));
        by+=ih;
        if(i<items.length-1)hl(by,BX,W-MR,'#f0edea',1);
      }
      const sh=Math.max(by-sy,ll.length*18+PAD*2+20)+PAD;
      fr(ML,sy,LW,sh,'#f9f9f8');
      ctx.font='bold 12px serif';ctx.fillStyle='#1a3052';
      ll.forEach((l,i)=>ctx.fillText(l,ML+8,sy+PAD+14+i*18));
      const[r2,g2,b2]=sec.accent;
      fr(ML+8,sy+PAD+14+ll.length*18+6,22,2,`rgb(${r2},${g2},${b2})`);
      ctx.save();ctx.strokeStyle='#e2e0dc';ctx.lineWidth=1;
      ctx.strokeRect(ML,sy,CW,sh);
      ctx.beginPath();ctx.moveTo(ML+LW,sy);ctx.lineTo(ML+LW,sy+sh);ctx.stroke();
      ctx.restore();
      y=sy+sh+1;
    }
    y+=16;hl(y,ML,W-MR,'#e2e0dc',1);y+=12;
    ctx.font='400 10px sans-serif';ctx.fillStyle='#aaa';
    ctx.fillText('※ 本レポートはAIによる補助目的です。内容は必ず担当弁護士が確認・修正してください。',ML,y+10);

    const tr=document.createElement('canvas');
    tr.width=W;tr.height=Math.max(H,y+40);
    const tc=tr.getContext('2d');tc.fillStyle='#fff';tc.fillRect(0,0,tr.width,tr.height);tc.drawImage(cv,0,0);

    const ib=atob(tr.toDataURL('image/jpeg',.92).split(',')[1]);
    const PW=595.28,PH=(tr.height/tr.width)*PW;
    const s2b=s=>{const b=new Uint8Array(s.length);for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i)&0xff;return b;};
    const cs=`q ${PW.toFixed(2)} 0 0 ${PH.toFixed(2)} 0 0 cm /Img Do Q`;
    const objs=[
      `<< /Type /Catalog /Pages 2 0 R >>`,
      `<< /Type /Pages /Kids [3 0 R] /Count 1 >>`,
      `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW.toFixed(2)} ${PH.toFixed(2)}] /Contents 4 0 R /Resources << /XObject << /Img 5 0 R >> >> >>`,
      `<< /Length ${cs.length} >>\nstream\n${cs}\nendstream`,
      null
    ];
    const parts=[s2b('%PDF-1.4\n')];
    let off=parts[0].length;const offs=[];
    for(let i=0;i<objs.length;i++){
      offs.push(off);
      if(i===4){
        const d=`<< /Type /XObject /Subtype /Image /Width ${tr.width} /Height ${tr.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${ib.length} >>\nstream\n`;
        const a=s2b(`${i+1} 0 obj\n`+d),b=s2b(ib),c=s2b('\nendstream\nendobj\n');
        parts.push(a,b,c);off+=a.length+b.length+c.length;
      }else{
        const ch=s2b(`${i+1} 0 obj\n${objs[i]}\nendobj\n`);parts.push(ch);off+=ch.length;
      }
    }
    let xr=`xref\n0 ${objs.length+1}\n0000000000 65535 f \n`;
    offs.forEach(o=>xr+=String(o).padStart(10,'0')+' 00000 n \n');
    parts.push(s2b(xr+`trailer\n<< /Size ${objs.length+1} /Root 1 0 R >>\nstartxref\n${off}\n%%EOF`));
    const tot=parts.reduce((s,p)=>s+p.length,0);
    const buf=new Uint8Array(tot);let pos=0;
    for(const p of parts){buf.set(p,pos);pos+=p.length;}
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([buf],{type:'application/pdf'}));
    a.download='IntakeAI_'+new Date().toISOString().slice(0,10)+'.pdf';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},2000);

  } catch(err) {
    console.error(err);alert('PDF生成に失敗しました: '+err.message);
  } finally {
    btn.disabled=false;btn.innerHTML=orig;
  }
}

//  HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setLoading(on){const b=document.getElementById('analyzeBtn');b.disabled=on;b.classList.toggle('loading',on);document.getElementById('btnText').textContent=on?'整理中...':'整理する';}
function showError(msg){const e=document.getElementById('errorBox');e.textContent=msg;e.classList.add('show');}
function hideError(){document.getElementById('errorBox').classList.remove('show');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
